spring:
  application:
    name: valoracloud-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false
    properties:
      hibernate:
        globally_quoted_identifiers: true
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:***}
      ssl:
        enabled: ${REDIS_TLS:false}
      timeout: 5000ms

  security:
    user:
      name: ${ADMIN_USER:admin}
      password: ${ADMIN_PASS:}

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

# ─── App-specific ────────────────────────────────────────
app:
  brand:
    name: ${BRAND_NAME:Valora Cloud}
    domain: ${BRAND_DOMAIN:valoracloud.com}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  auth:
    jwt-secret: ${JWT_SECRET:change-this-to-a-secure-base64-key}
    access-expiry: ${JWT_ACCESS_EXPIRY:15m}
    refresh-expiry: ${JWT_REFRESH_EXPIRY:30d}
  encryption-key: ${ENCRYPTION_KEY:***}
  provisioning:
    worker-enabled: ${PROVISIONING_WORKER_ENABLED:true}
    dry-run: ${PROVISIONING_DRY_RUN:false}
  queue:
    redis:
      host: ${QUEUE_REDIS_HOST:${REDIS_HOST:localhost}}
      port: ${QUEUE_REDIS_PORT:${REDIS_PORT:6379}}
      password: ${QUEUE_REDIS_PASSWORD:${REDIS_PASSWORD:}}
      tls: ${QUEUE_REDIS_TLS:${REDIS_TLS:false}}
  contabo:
    api-url: ${CONTABO_API_URL:https://api.contabo.com}
    client-id: ${CONTABO_CLIENT_ID:}
    client-secret: ${CONTABO_CLIENT_SECRET:***}
    api-user: ${CONTABO_API_USER:}
    api-password: ${CONTABO_API_PASSWORD:***}
    auth-url: ${CONTABO_AUTH_URL:https://auth.contabo.com/auth/realms/contabo/protocol/openid-connect/token}
  whois-privacy:
    handle-id: ${WHOIS_PRIVACY_HANDLE_ID:}
    price: ${WHOIS_PRIVACY_PRICE:2.99}

# ─── Stripe (flat — matches BillingService @Value) ─────
stripe:
  secret-key: ${STRIPE_SECRET_KEY:***}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:***}
  enabled: ${STRIPE_ENABLED:true}

# ─── SHKeeper (flat — matches SHKeeperService @Value) ──
shkeeper:
  enabled: ${SHKEEPER_ENABLED:false}
  base-url: ${SHKEEPER_BASE_URL:https://gateway.valoracloud.com}
  api-key: ${SHKEEPER_API_KEY:***}

# ─── Facebook Conversions API ──────────────────────────
facebook:
  pixel-id: ${FACEBOOK_PIXEL_ID:}
  access-token: ${FACEBOOK_ACCESS_TOKEN:***}
  test-event-code: ${FACEBOOK_TEST_EVENT_CODE:}

# ─── Telegram Bot (monitoring alerts) ──────────────────
telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}

# ─── Upstash Redis REST (optional) ─────────────────────
upstash:
  redis:
    rest-url: ${UPSTASH_REDIS_REST_URL:}
    rest-token: ${UPSTASH_REDIS_REST_TOKEN:***}

# ─── Springdoc ───────────────────────────────────────────
springdoc:
  api-docs:
    path: /docs-json
  swagger-ui:
    path: /docs
    operations-sorter: alpha
    tags-sorter: alpha

# ─── Rate limiting ──────────────────────────────────────
bucket4j:
  enabled: true
  filters:
    - cache-name: rate-limit-buckets
      filter-method: servlet
      url: /api/.*
      rate-limits:
        - execute-condition: "true"
          bandwidths:
            - capacity: 60
              time: 1
              unit: minutes

# ─── Logging ─────────────────────────────────────────────
logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.valoracloud: ${APP_LOG_LEVEL:DEBUG}
    org.springframework.web: INFO
    org.hibernate.SQL: ${HIBERNATE_LOG:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
